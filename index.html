<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
    <title>The Pot</title>
    <style>
        html {
            height: 100%;
        }

        html,
        body {
            display: block;
        }

        body {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ingredients {
            width: 100%;
            height: 100px;
            background-color: bisque;
            border-radius: 20px;

            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: space-evenly;
        }

        .item {
            border-radius: 50%;
            background-color: red;
            padding-top: 100%;
            width: 40px;
            animation: ease;
            z-index: 10;
        }

        /* background-image: linear-gradient(to bottom, rgb(0,77,81),rgb(33,57,67));
			background-repeat: no-repeat;
			background-attachment: fixed; */
        .pot {
            width: 100%;
        }

        .lid {
            visibility: hidden;

            background-image: radial-gradient(rgb(0, 113, 119), rgb(43, 74, 87));
            background-repeat: no-repeat;
            background-attachment: fixed;

            border-radius: 50%;
            width: 500px;
            height: 250px;
            position: absolute;
        }

        .body {
            background-image: linear-gradient(to bottom, rgb(43, 74, 87), rgb(33, 57, 67));
            background-repeat: no-repeat;
            background-attachment: fixed;

            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;
            width: 500px;
            height: 400px;
            position: relative;
            left: 50%;
            transform: translate(-50%, 0);


        }
    </style>
    <script>
        var highest = 10

        function falltoggle(i) {
            i.addClass("gravity");
        };

        $(document).ready(function () {
            $(".item").draggable();

            //make all gravity items have gravity
            

            console.log("ready");
            $(".item").on({
                mouseenter: function () {
                    $(this).css("box-shadow", "0 0 10px black");
                    $(this).css("");
                },
                mouseleave: function () {
                    $(this).css("box-shadow", "0 0 0 black");
                },
                mousedown: function () {
                    $(this).css("z-index", highest);
                    highest = highest + 1;
                },
                mouseup: function () {

                }
            });
        });
    </script>
</head>

<body>
    <div class="ingredients">
        <div class="item-box">
            <div class="item"></div>
        </div>
        <div class="item-box">
            <div class="item"></div>
        </div>
        <div class="item-box">
            <div class="item"></div>
        </div>
        <div class="item-box">
            <div class="item"></div>
        </div>
    </div>
    <div class="pot">
        <div class="body"></div>
        <div class="lid"></div>
        <div class="base"></div>
    </div>
</body>

</html>
